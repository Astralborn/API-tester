[mypy]
python_version = 3.10
mypy_path = src
ignore_missing_imports = True
warn_return_any = False
warn_unused_ignores = False

# PySide6 ships no py.typed marker — suppress all missing-import noise
[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-urllib3.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

# Mixin composition — mypy cannot resolve methods through the MRO
# when protocols are used as self-type stubs. Known limitation.
[mypy-app]
disable_error_code = attr-defined,misc

